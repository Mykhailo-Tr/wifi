<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
    background: black;
    margin: 0;
    overflow: hidden;
    color: lime;
    font-family: monospace;
}

#console {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 120px;
    background: rgba(0,0,0,0.8);
    overflow-y: auto;
    font-size: 12px;
    padding: 5px;
}

canvas {
    display: block;
}
</style>
</head>
<body>

<canvas id="radar"></canvas>
<div id="console"></div>

<script>
const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");
const consoleDiv = document.getElementById("console");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];

function log(msg) {
    consoleDiv.innerHTML += msg + "<br>";
    consoleDiv.scrollTop = consoleDiv.scrollHeight;
}

function drawRadar() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let cx = canvas.width / 2;
    let cy = canvas.height / 2;
    let radius = Math.min(cx, cy) * 0.9;

    // коло
    ctx.strokeStyle = "green";
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.stroke();

    // точки
    points.forEach(p => {
        ctx.globalAlpha = p.alpha;

        // 🔥 колір залежить від сили
        if (p.power > 0.5) ctx.fillStyle = "red";
        else if (p.power > 0.2) ctx.fillStyle = "yellow";
        else ctx.fillStyle = "lime";

        ctx.beginPath();
        ctx.arc(
            cx + Math.cos(p.angle) * p.r * radius,
            cy + Math.sin(p.angle) * p.r * radius,
            6,
            0,
            Math.PI * 2
        );
        ctx.fill();
    });

    ctx.globalAlpha = 1;
}

function updatePoints() {
    points = points.filter(p => p.alpha > 0);
    points.forEach(p => p.alpha -= 0.02);
}

async function fetchData() {
    try {
        let res = await fetch("/data");
        let data = await res.json();

        log("movement: " + data.movement.toFixed(3));

        // 🔥 нормальний поріг
        if (data.movement > 0.05) {
            points.push({
                angle: Math.random() * Math.PI * 2,
                r: 1 - data.movement,
                alpha: 1,
                power: data.movement
            });
        }

    } catch (e) {
        log("ERROR: " + e);
    }
}

setInterval(fetchData, 400);

function loop() {
    updatePoints();
    drawRadar();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
