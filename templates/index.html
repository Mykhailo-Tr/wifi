<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
    background: black;
    margin: 0;
    overflow: hidden;
    color: lime;
    font-family: monospace;
}

#console {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 120px;
    background: rgba(0,0,0,0.8);
    overflow-y: auto;
    font-size: 12px;
    padding: 5px;
}

canvas {
    display: block;
}
</style>
</head>
<body>

<canvas id="radar"></canvas>
<div id="console"></div>

<script>
const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");
const consoleDiv = document.getElementById("console");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];
let rectPoints = [];

function log(msg) {
    consoleDiv.innerHTML += msg + "<br>";
    consoleDiv.scrollTop = consoleDiv.scrollHeight;
}

function drawRadar() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let cx = canvas.width / 2;
    let cy = canvas.height / 2;
    let radius = Math.min(cx, cy) * 0.35;

    // 🔵 круг
    ctx.strokeStyle = "green";
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.stroke();

    // точки круга
    points.forEach(p => {
        ctx.globalAlpha = p.alpha;

        ctx.fillStyle = p.power > 0.5 ? "red" : (p.power > 0.2 ? "yellow" : "lime");

        ctx.beginPath();
        ctx.arc(
            cx + Math.cos(p.angle) * p.r * radius,
            cy + Math.sin(p.angle) * p.r * radius,
            5,
            0,
            Math.PI * 2
        );
        ctx.fill();
    });

    // 📊 прямокутник (праворуч)
    let rx = canvas.width * 0.75;
    let ry = canvas.height * 0.2;
    let rw = canvas.width * 0.15;
    let rh = canvas.height * 0.5;

    ctx.strokeStyle = "green";
    ctx.strokeRect(rx, ry, rw, rh);

    // шкала
    for (let i = 0; i <= 5; i++) {
        let y = ry + (rh / 5) * i;
        ctx.beginPath();
        ctx.moveTo(rx, y);
        ctx.lineTo(rx + rw, y);
        ctx.stroke();

        ctx.fillStyle = "lime";
        ctx.fillText((1 - i/5).toFixed(1), rx + rw + 5, y);
    }

    // точки прямокутника
    rectPoints.forEach(p => {
        ctx.globalAlpha = p.alpha;

        ctx.fillStyle = "cyan";

        let y = ry + p.distance * rh;
        let x = rx + Math.random() * rw;

        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
    });

    ctx.globalAlpha = 1;
}

function updatePoints() {
    points = points.filter(p => p.alpha > 0);
    points.forEach(p => p.alpha -= 0.02);

    rectPoints = rectPoints.filter(p => p.alpha > 0);
    rectPoints.forEach(p => p.alpha -= 0.02);
}

async function fetchData() {
    try {
        let res = await fetch("/data");
        let data = await res.json();

        log(`movement: ${data.movement.toFixed(3)} | dist: ${data.distance.toFixed(3)}`);

        if (data.movement > 0.05) {
            // круг
            points.push({
                angle: Math.random() * Math.PI * 2,
                r: data.distance,
                alpha: 1,
                power: data.movement
            });

            // прямокутник
            rectPoints.push({
                distance: data.distance,
                alpha: 1
            });
        }

    } catch (e) {
        log("ERROR: " + e);
    }
}

setInterval(fetchData, 400);

function loop() {
    updatePoints();
    drawRadar();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
